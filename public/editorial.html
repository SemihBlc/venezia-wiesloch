  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

hape=\"rect\" placeholder=\"Gelato-Aufnahme — quer, appetitlich\"><\u002Fimage-slot>\n\n    <!-- Hero text -->\n    <section data-screen-label=\"Hero\" style=\"padding:32px 26px 42px;\">\n      <div style=\"font:600 11px/1 'Helvetica Neue',Helvetica,Arial,sans-serif; letter-spacing:.24em; text-transform:uppercase; color:var(--accent,#BE4426);\">Gelateria · Wiesloch<\u002Fdiv>\n      <h1 style=\"margin:16px 0 0;\">\n        <span style=\"display:block; font:500 30px/1 'Bodoni Moda',Georgia,serif; color:#2A1B12; letter-spacing:.004em;\">Hausgemachtes<\u002Fspan>\n        <span style=\"display:block; font:500 italic 68px/0.9 'Bodoni Moda',Georgia,serif; color:#2A1B12; margin-top:4px;\">Gelato.<\u002Fspan>\n      <\u002Fh1>\n      <p style=\"margin:22px 0 0; max-width:32ch; font:400 15.5px/1.62 'Helvetica Neue',Helvetica,Arial,sans-serif; color:#6B5848;\">Hausgemachtes Gelato, italienischer Espresso und Dolci — italienische Eistradition in der Hauptstraße von Wiesloch.<\u002Fp>\n\n      <!-- Live status -->\n      <div style=\"margin-top:24px;\">\n        <sc-if value=\"{{ open }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display:inline-flex; align-items:center; gap:9px; padding:9px 15px; border:1px solid rgba(190,68,38,.3); border-radius:999px; background:rgba(190,68,38,.07);\">\n            <span style=\"width:8px; height:8px; border-radius:50%; background:var(--accent,#BE4426); animation:veneziaPulse 2.4s ease-in-out infinite;\"><\u002Fspan>\n            <span style=\"font:600 11px/1 'Helvetica Neue',Helvetica,Arial,sans-serif; letter-spacing:.04em; color:var(--accent,#BE4426);\">{{ statusLabel }}<\u002Fspan>\n            <span style=\"width:3px; height:3px; border-radius:50%; background:rgba(42,27,18,.25);\"><\u002Fspan>\n            <span style=\"font:400 12px/1 'Helvetica Neue',Helvetica,Arial,sans-serif; color:#6B5848;\">{{ statusSub }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ closed }}\" hint-plac e',Helvetica,Arial,sans-serif; color:#94826F; white-space:nowrap;\">im Glas serviert<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex; align-items:baseline; justify-content:space-between; gap:14px; padding:13px 0; border-bottom:1px solid rgba(42,27,18,.1);\">\n            <span style=\"font:500 17px/1.25 'Helvetica Neue',Helvetica,Arial,sans-serif; color:#2A1B12;\">Spaghetti-Eis<\u002Fspan>\n            <span style=\"font:400 13px/1.2 'Helvetica Neue',Helvetica,Arial,sans-serif; color:#94826F; white-space:nowrap;\">der Klassiker<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- Group: Kaffee -->\n        <div style=\"margin-top:28px;\">\n          <div style=\"font:600 11px/1 'Helvetica Neue',Helvetica,Arial,sans-serif; letter-spacing:.2em; text-transform:uppercase; color:var(--accent,#BE4426); margin-bottom:6px;\">Kaffee<\u002Fdiv>\n          <div style=\"display:flex; align-items:baseline; justify-content:space-between; gap:14px; padding:13px 0; border-bottom:1px solid rgba(42,27,18,.1);\">\n            <span style=\"font:500 17px/1.25 'Helvetica Neue',Helvetica,Arial,sans-serif; color:#2A1B12;\">Italienischer Kaffee<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex; align-items:baseline; justify-content:space-between; gap:14px; padding:13px 0; border-bottom:1px solid rgba(42,27,18,.1);\">\n            <span style=\"font:500 17px/1.25 'Helvetica Neue',Helvetica,Arial,sans-serif; color:#2A1B12;\">Espresso<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- Group: Dolci -->\n        <div style=\"margin-top:28px;\">\n          <div style=\"font:600 11px/1 'Helvetica Neue',Helvetica,Arial,sans-serif; letter-spacing:.2em; text-transform:uppercase; color:var(--accent,#BE4426); margin-bottom:6px;\">Dolci<\u002Fdiv>\n          <div style=\"display:flex; align-items:baseline; justify-content:space-between; gap:14px; padding:13px 0; border-bottom:1px solid rgba(42,27,18,.1);\">\n tyle=\"flex:1; display:inline-flex; align-items:center; justify-content:center; height:52px; background:var(--accent,#BE4426); color:#FFF6EF; text-decoration:none; font:600 12.5px/1 'Helvetica Neue',Helvetica,Arial,sans-serif; letter-spacing:.16em; text-transform:uppercase; border-radius:3px;\" style-hover=\"opacity:.92;\">Anrufen<\u002Fa>\n    <a href=\"{{ mapHref }}\" target=\"_blank\" rel=\"noopener\" style=\"flex:1; display:inline-flex; align-items:center; justify-content:center; height:52px; background:transparent; color:#2A1B12; text-decoration:none; font:600 12.5px/1 'Helvetica Neue',Helvetica,Arial,sans-serif; letter-spacing:.16em; text-transform:uppercase; border:1px solid rgba(42,27,18,.38); border-radius:3px;\" style-hover=\"background:rgba(42,27,18,.05);\">Route<\u002Fa>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;accent&quot;: { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#BE4426&quot;, &quot;options&quot;: [&quot;#BE4426&quot;, &quot;#A8381C&quot;, &quot;#C75A2B&quot;, &quot;#9E3520&quot;], &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Stil&quot; },\n  &quot;heroHeight&quot;: { &quot;editor&quot;: &quot;range&quot;, &quot;default&quot;: 460, &quot;min&quot;: 340, &quot;max&quot;: 640, &quot;step&quot;: 10, &quot;unit&quot;: &quot;px&quot;, &quot;tsType&quot;: &quot;number&quot;, &quot;section&quot;: &quot;Stil&quot; },\n  &quot;statusMode&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;Live (Uhrzeit)&quot;, &quot;options&quot;: [&quot;Live (Uhrzeit)&quot;, &quot;Immer geöffnet&quot;, &quot;Immer geschlossen&quot;], &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Verhalten&quot; }\n}\">\nclass Component extends DCLogic {\n  containerRef = React.createRef();\n  state = Object.assign({ scrolled: false }, this.computeStatus());\n\n  componentDidMount() {\n    this.applyTweaks();\n    this._tick = setInterval(() => this.setState(this.computeStatus()), 30000);\n    this._onScroll = () => {\n      const s = (window.scrollY || window.pageYOffset || 0) > 420;\n      if (s !== this.state.scrolled) this.setState({ scrolled: s });\n    };\n    window.addEventListener('scroll', this._onScroll, { passive: true });\n    requestAnimationFrame(() => this.setupReveal());\n  }\n\n  componentDidUpdate(prev) {\n    if (prev.accent !== this.props.accent || prev.heroHeight !== this.props.heroHeight) this.applyTweaks();\n    if (prev.statusMode !== this.props.statusMode) this.setState(this.computeStatus());\n  }\n\n  componentWillUnmount() {\n    clearInterval(this._tick);\n    window.removeEventListener('scroll', this._onScroll);\n    if (this._io) this._io.disconnect();\n  }\n\n  applyTweaks() {\n    const el = this.containerRef.current;\n    if (!el) return;\n    if (this.props.accent) el.style.setProperty('--accent', this.props.accent);\n    if (this.props.heroHeight) el.style.setProperty('--hero-h', this.props.heroHeight + 'px');\n  }\n\n  berlinNow() {\n    try { return new Date(new Date().toLocaleString('en-US', { timeZone: 'Europe/Berlin' })); }\n    catch (e) { return new Date(); }\n  }\n  openMin(day) { return day === 0 ? 600 : 540; }\n  fmtHour(min) { const h = Math.floor(min / 60), m = min % 60; return h + ':' + String(m).padStart(2, '0'); }\n\n  computeStatus() {\n    const mode = (this.props && this.props.statusMode) || 'Live (Uhrzeit)';\n    const b = this.berlinNow();\n    const day = b.getDay();\n    const cur = b.getHours() * 60 + b.getMinutes();\n    const o = this.openMin(day), c = 1380;\n    let open = cur >= o && cur < c;\n    if (mode === 'Immer geöffnet') open = true;\n    if (mode === 'Immer geschlossen') open = false;\n    let label, sub;\n    if (open) {\n      label = 'Jetzt geöffnet';\n      sub = 'Heute bis 23:00 Uhr';\n    } else {\n      label = 'Geschlossen';\n      if (mode === 'Immer geschlossen') sub = 'Öffnet wieder um 9:00 Uhr';\n      else if (cur < o) sub = 'Öffnet heute um ' + this.fmtHour(o) + ' Uhr';\n      else { const nd = (day + 1) % 7; sub = 'Öffnet morgen um ' + this.fmtHour(this.openMin(nd)) + ' Uhr'; }\n    }\n    return { open: open, closed: !open, statusLabel: label, statusSub: sub, todayDay: day };\n  }\n\n  setupReveal() {\n    const root = this.containerRef.current;\n    if (!root || !('IntersectionObserver' in window)) return;\n    const els = root.querySelectorAll('[data-reveal]');\n    this._io = new IntersectionObserver((entries) => {\n      entries.forEach((e) => {\n        if (e.isIntersecting) {\n          e.target.style.opacity = '1';\n          e.target.style.transform = 'none';\n          this._io.unobserve(e.target);\n        }\n      });\n    }, { threshold: 0.1, rootMargin: '0px 0px -7% 0px' });\n    const vh = window.innerHeight || 800;\n    els.forEach((el) => {\n      if (el.getBoundingClientRect().top < vh * 0.9) return;\n      el.style.opacity = '0';\n      el.style.transform = 'translateY(22px)';\n      el.style.transition = 'opacity 1s cubic-bezier(.22,.61,.36,1), transform 1s cubic-bezier(.22,.61,.36,1)';\n      this._io.observe(el);\n    });\n  }\n\n  renderVals() {\n    const dialHref = 'tel:+49622250499';\n    const mapHref = 'https://www.google.com/maps/dir/?api=1&destination=' + encodeURIComponent('Eiscafé Venezia, Hauptstraße 124, 69168 Wiesloch');\n    const googleHref = 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent('Eiscafé Venezia Wiesloch');\n    const days = [\n      { name: 'Montag', range: '9 – 23 Uhr', d: 1 },\n      { name: 'Dienstag', range: '9 – 23 Uhr', d: 2 },\n      { name: 'Mittwoch', range: '9 – 23 Uhr', d: 3 },\n      { name: 'Donnerstag', range: '9 – 23 Uhr', d: 4 },\n      { name: 'Freitag', range: '9 – 23 Uhr', d: 5 },\n      { name: 'Samstag', range: '9 – 23 Uhr', d: 6 },\n      { name: 'Sonntag', range: '10 – 23 Uhr', d: 0 }\n    ].map((x) => ({ name: x.name, range: x.range, isToday: x.d === this.state.todayDay }));\n    return {\n      containerRef: this.containerRef,\n      open: this.state.open,\n      closed: this.state.closed,\n      statusLabel: this.state.statusLabel,\n      statusSub: this.state.statusSub,\n      topBarTransform: this.state.scrolled ? 'translateX(-50%) translateY(0)' : 'translateX(-50%) translateY(-115%)',\n      topBarOpacity: this.state.scrolled ? 1 : 0,\n      dialHref: dialHref,\n      mapHref: mapHref,\n      googleHref: googleHref,\n      days: days\n    };\n  }\n}\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
